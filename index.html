<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>📝 To Do List</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/> 
<link href="./style.css" rel="stylesheet"/> 

</head>
<body>
<div class="container">

  <div class="header">
    <h1><span>📝</span>To Do List</h1>
  </div>

  <div class="task-section">
    <div class="section-label"><span>Task List</span></div>
    <div class="task-list" id="taskList"></div>
  </div>

  
  <div class="add-section">
    <div class="section-label"><span>Add New Task</span></div>
    <div class="add-row">
      <div class="add-input-wrap">
        <input type="text" class="task-input" id="taskInput" placeholder="Add task here………………" maxlength="120"/>
      </div>
      <button class="submit-btn" id="addBtn" title="Add task">🔼</button>
    </div>
    <div class="stats-row">
      <div class="stat">Total: <span id="totalCount">0</span></div>
      <div class="stat">Done: <span id="doneCount">0</span></div>
      <div class="stat">Remaining: <span id="leftCount">0</span></div>
    </div>
  </div>

</div>
<script src="./script.js">
  
</script>
</body>
</html>
